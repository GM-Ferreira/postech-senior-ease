name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate Firebase options from secrets
        run: |
          sed -e "s|{{FIREBASE_WEB_API_KEY}}|${{ secrets.FIREBASE_WEB_API_KEY }}|g" \
              -e "s|{{FIREBASE_WEB_APP_ID}}|${{ secrets.FIREBASE_WEB_APP_ID }}|g" \
              -e "s|{{FIREBASE_ANDROID_API_KEY}}|${{ secrets.FIREBASE_ANDROID_API_KEY }}|g" \
              -e "s|{{FIREBASE_ANDROID_APP_ID}}|${{ secrets.FIREBASE_ANDROID_APP_ID }}|g" \
              -e "s|{{FIREBASE_MESSAGING_SENDER_ID}}|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" \
              -e "s|{{FIREBASE_PROJECT_ID}}|${{ secrets.FIREBASE_PROJECT_ID }}|g" \
              -e "s|{{FIREBASE_AUTH_DOMAIN}}|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" \
              -e "s|{{FIREBASE_STORAGE_BUCKET}}|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" \
              -e "s|{{FIREBASE_MEASUREMENT_ID}}|${{ secrets.FIREBASE_MEASUREMENT_ID }}|g" \
              lib/firebase_options_template.dart > lib/firebase_options.dart

      - name: Generate google-services.json from secrets
        run: |
          sed -e "s|{{FIREBASE_MESSAGING_SENDER_ID}}|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" \
              -e "s|{{FIREBASE_PROJECT_ID}}|${{ secrets.FIREBASE_PROJECT_ID }}|g" \
              -e "s|{{FIREBASE_STORAGE_BUCKET}}|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" \
              -e "s|{{FIREBASE_ANDROID_APP_ID}}|${{ secrets.FIREBASE_ANDROID_APP_ID }}|g" \
              -e "s|{{FIREBASE_ANDROID_API_KEY}}|${{ secrets.FIREBASE_ANDROID_API_KEY }}|g" \
              -e "s|{{GOOGLE_ANDROID_CLIENT_ID}}|${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}|g" \
              -e "s|{{GOOGLE_WEB_CLIENT_ID}}|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|g" \
              -e "s|{{ANDROID_CERT_HASH}}|${{ secrets.ANDROID_CERT_HASH }}|g" \
              android/app/google-services-template.json > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web
        run: flutter build web
